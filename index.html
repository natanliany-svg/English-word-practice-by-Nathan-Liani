<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Day Fluency Sprint | Master V36 (Optimized & Cleaned)</title>
    <style>
        /* === Premium UI - Perfect Proportion Engine (V36) === */
        html { font-size: 11.5px; }

        :root {
            --bg-main: #040914;
            --bg-card: rgba(16, 26, 48, 0.85);
            --border: rgba(34, 211, 238, 0.25);
            --border-light: rgba(52, 211, 153, 0.35);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --cyan-main: #06b6d4;
            --cyan-light: #22d3ee;
            --emerald-main: #10b981;
            --emerald-light: #34d399;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #081024 100%);
            color: var(--text-main); 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 1.5vh 2vw; 
            overflow: hidden; 
        }
        
        .container { 
            width: 100%; 
            max-width: 1400px; 
            display: flex; 
            flex-direction: column; 
            align-items: stretch; 
            height: 100%; 
        }
        
        /* HEADER */
        .header-section { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; margin-bottom: 0.5vh; }
        h1 { font-size: clamp(16px, 2.5vh, 26px); font-weight: 900; letter-spacing: 1px; color: #fff; display: flex; align-items: center; gap: 1vh; margin-bottom: 0.5vh; text-shadow: 0 0 10px rgba(34, 211, 238, 0.6);}
        h1 svg { width: 2.5vh; height: 2.5vh; filter: drop-shadow(0 0 10px rgba(34,211,238,0.8)); }
        
        .nav-tier { background: rgba(15, 23, 42, 0.85); border-radius: 0.8vh; border: 1px solid rgba(255,255,255,0.1); padding: 0.4vh 1vw; margin-bottom: 0.5vh; display: flex; gap: 0.5vw; justify-content: center;}
        .nav-btn { background: transparent; border: 1px solid transparent; color: #94a3b8; padding: 0.4vh 1.2vw; border-radius: 0.6vh; font-size: clamp(12px, 1.6vh, 18px); font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap;}
        .nav-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-btn.active-cyan { background: rgba(34, 211, 238, 0.15); color: var(--cyan-light); border-color: rgba(34, 211, 238, 0.5); box-shadow: 0 0 10px rgba(34, 211, 238, 0.2); }
        .nav-btn.active-emerald { background: rgba(52, 211, 153, 0.15); color: var(--emerald-light); border-color: rgba(52, 211, 153, 0.5); }
        
        .sub-nav { display: flex; gap: 0.5vw; justify-content: center; width: 100%; flex-wrap: wrap;}
        .sub-btn { display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.8vh; padding: 0.4vh 1vw; cursor: pointer; color: #94a3b8; transition: 0.2s; min-width: 8vw;}
        .sub-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .sub-btn.active { background: linear-gradient(145deg, #1e293b, #0f172a); color: #fff; border-color: var(--cyan-main); box-shadow: 0 2px 8px rgba(34, 211, 238, 0.3); transform: translateY(-1px);}
        .sub-btn-title { font-size: clamp(10px, 1.3vh, 16px); font-weight: 900; margin-bottom: 0.2vh;}
        .sub-btn-date { font-size: clamp(9px, 1.1vh, 14px); color: var(--cyan-light); font-family: monospace; }

        /* CONTENT */
        #content-area { display: flex; flex-direction: column; flex-grow: 1; min-height: 0; width: 100%; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1vh; width: 100%; flex-shrink: 0;}
        .settings-box { display: flex; align-items: center; gap: 1vw; background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(255,255,255,0.1); padding: 0.4vh 1vw; border-radius: 0.8vh;}
        .settings-box select { background: #0f172a; color: var(--cyan-light); border: 1px solid rgba(255,255,255,0.2); padding: 0.3vh 0.6vw; border-radius: 0.5vh; font-size: clamp(10px, 1.4vh, 16px); font-weight: bold; outline: none; cursor: pointer;}
        
        .progress-box { display: flex; flex-direction: column; align-items: flex-end; color: var(--cyan-light); font-size: clamp(11px, 1.4vh, 18px); font-weight: 900; background: rgba(30, 41, 59, 0.9); padding: 0.4vh 1vw; border-radius: 0.8vh; border: 1px solid rgba(255,255,255,0.1);}
        .progress-dots { display: flex; gap: 0.4vw; margin-top: 0.3vh; }
        .dot { height: 0.6vh; border-radius: 0.3vh; transition: 0.3s; }
        .dot.active { width: 3vw; background: var(--cyan-light); box-shadow: 0 0 10px var(--cyan-light); }
        .dot.done { width: 1vw; background: rgba(52, 211, 153, 0.8); }
        .dot.pending { width: 1vw; background: rgba(255,255,255,0.15); }

        .flashcard { 
            background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); border-radius: 2vh; 
            padding: 2vh 3vw; box-shadow: 0 2vh 4vh rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05); 
            display: flex; flex-direction: column; gap: 1.5vh; flex-grow: 1; min-height: 0; overflow-y: auto; margin-bottom: 1vh;
        }
        
        .flashcard::-webkit-scrollbar, .weeks-scroll::-webkit-scrollbar, .compact-grid::-webkit-scrollbar, .nav-tier::-webkit-scrollbar, .sub-nav::-webkit-scrollbar { width: 8px; height: 8px;}
        .flashcard::-webkit-scrollbar-thumb, .weeks-scroll::-webkit-scrollbar-thumb, .compact-grid::-webkit-scrollbar-thumb, .nav-tier::-webkit-scrollbar-thumb, .sub-nav::-webkit-scrollbar-thumb { background: var(--cyan-main); border-radius: 10px; }
        
        .center-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1vh; background: rgba(255,255,255,0.02); border-radius: 1.5vh; padding: 1.5vh; border-bottom: 1px solid rgba(34, 211, 238, 0.1); flex-shrink: 0; min-height: min-content; }
        .word-main-row { display: flex; align-items: center; justify-content: center; gap: 1.5vw; direction: ltr; }
        .audio-btn { background: rgba(34, 211, 238, 0.1); border: 2px solid var(--cyan-main); color: var(--cyan-light); width: clamp(40px, 5vh, 70px); height: clamp(40px, 5vh, 70px); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); flex-shrink: 0;}
        .audio-btn:hover { background: var(--cyan-main); color: #fff; transform: scale(1.1); box-shadow: 0 0 25px rgba(34, 211, 238, 0.5); }
        .audio-btn svg { width: clamp(20px, 2.5vh, 35px); height: clamp(20px, 2.5vh, 35px); }
        
        .word-title { font-size: clamp(30px, 5.5vh, 70px); font-weight: 900; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); letter-spacing: -1px; display: flex; align-items: center; gap: 1vw; text-align: center;}
        .small-emoji { font-size: clamp(20px, 3.5vh, 45px); filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); margin-top: -0.5vh;}

        .tags-row { display: flex; align-items: stretch; justify-content: center; gap: 1vw; flex-wrap: wrap;}
        .tag-box { font-size: clamp(14px, 2vh, 24px); font-weight: 900; padding: 0.6vh 2vw; border-radius: 1vh; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; min-width: 12vw; text-align: center; }
        .tag-meaning { background: rgba(16, 185, 129, 0.15); color: var(--emerald-light); border: 1px solid rgba(16, 185, 129, 0.4); }
        .tag-phonetic { background: rgba(34, 211, 238, 0.15); color: var(--cyan-light); border: 1px solid rgba(34, 211, 238, 0.4); white-space: nowrap !important; }

        .content-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 2vw; flex-grow: 1; min-height: min-content; }
        @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } }

        .text-col { display: flex; flex-direction: column; gap: 1.5vh; min-height: min-content; justify-content: center;}
        
        .section-title { font-size: clamp(12px, 1.6vh, 20px); font-weight: bold; color: var(--cyan-light); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 0.5vw; margin-bottom: 0.5vh;}
        .section-title svg { width: clamp(14px, 1.8vh, 22px); height: clamp(14px, 1.8vh, 22px); }
        .section-title.emerald { color: var(--emerald-light); }

        .explanation-box { background: rgba(2, 6, 23, 0.6); border-right: 0.4vw solid var(--cyan-main); padding: 1.5vh 1.5vw; border-radius: 1vh; font-size: clamp(14px, 2vh, 24px); color: #cbd5e1; line-height: 1.4; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); flex-shrink: 0; min-height: min-content;}
        .example-box { background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.95)); border: 1px solid var(--border-light); padding: 2vh 2vw; border-radius: 1.5vh; box-shadow: 0 1vh 2vh rgba(0,0,0,0.4); flex-grow: 1; display: flex; flex-direction: column; justify-content: center; min-height: min-content;}
        
        .example-eng-row { display: flex; align-items: flex-start; gap: 1vw; margin-bottom: 1.5vh; direction: ltr; }
        .audio-small { background: rgba(52, 211, 153, 0.1); color: var(--emerald-light); width: clamp(30px, 4vh, 50px); height: clamp(30px, 4vh, 50px); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--emerald-main); transition: 0.3s; flex-shrink: 0;}
        .audio-small:hover { background: var(--emerald-main); color: #fff; transform: scale(1.1);}
        .audio-small svg { width: clamp(15px, 2vh, 30px); height: clamp(15px, 2vh, 30px); }
        
        .example-eng { font-size: clamp(16px, 2.8vh, 36px); color: #fff; font-style: italic; font-family: Georgia, serif; line-height: 1.3; padding-top: 0.5vh; text-shadow: 0 2px 4px rgba(0,0,0,0.5);}
        .example-heb { font-size: clamp(14px, 2.2vh, 28px); color: var(--emerald-light); font-weight: 600; border-right: 0.4vw solid var(--emerald-main); padding-right: 1vw; margin-right: 4vw; line-height: 1.4;}

        .visual-col { display: flex; align-items: stretch; justify-content: center; min-height: 200px;}

        /* === QUIZ STYLES === */
        .quiz-opt-btn { background: rgba(30, 41, 59, 0.9); border: 2px solid rgba(255,255,255,0.1); border-radius: 1.5vh; padding: 2.5vh 2vw; color: var(--text-main); font-size: clamp(14px, 2.2vh, 24px); font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; text-align: center; }
        .quiz-opt-btn:hover:not(.disabled):not(.correct):not(.wrong) { background: rgba(34, 211, 238, 0.15); border-color: var(--cyan-main); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(34, 211, 238, 0.3); }
        .quiz-opt-btn.correct { background: rgba(16, 185, 129, 0.2) !important; border-color: var(--emerald-main) !important; color: var(--emerald-light) !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4) !important; }
        .quiz-opt-btn.wrong { background: rgba(239, 68, 68, 0.2) !important; border-color: #ef4444 !important; color: #fca5a5 !important; }
        .quiz-opt-btn.disabled { opacity: 0.6; cursor: not-allowed; }
        .history-item { display: flex; justify-content: space-between; padding: 1.5vh; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 1.2rem;}
        .history-item:last-child { border-bottom: none; }

        /* === MATRIX SUMMARY STYLES === */
        .matrix-wrapper { flex: 1; overflow-y: auto; display: flex; flex-direction: column; width: 100%; padding: 2vh; background: rgba(15, 23, 42, 0.7); border-radius: 2vh; border: 1px solid var(--border); box-shadow: 0 2vh 4vh rgba(0,0,0,0.5); }
        .summary-toggles { display: flex; justify-content: center; gap: 1.5vw; margin-bottom: 2vh; flex-shrink: 0;}
        .sum-toggle { background: rgba(30, 41, 59, 0.8); color: var(--cyan-light); border: 1px solid var(--cyan-main); padding: 1vh 2vw; border-radius: 1vh; font-size: clamp(12px, 1.8vh, 20px); font-weight: bold; cursor: pointer; transition: 0.3s;}
        .sum-toggle.active { background: var(--cyan-main); color: #fff; box-shadow: 0 0 2vh rgba(34,211,238,0.5);}
        .weeks-scroll { flex-grow: 1; width: 100%; overflow-y: auto; padding-right: 1vw; display: flex; flex-direction: column; gap: 4vh;}
        .week-section { flex: 0 0 auto; display: flex; flex-direction: column; padding-bottom: 2vh;} 
        .week-title { color: #fde047; text-shadow: 0 0 2vh rgba(253, 224, 71, 0.8); font-size: clamp(24px, 3.5vh, 40px); font-weight: 900; text-align: center; margin-bottom: 1.5vh; letter-spacing: 2px;}
        .days-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5vh; }
        .compact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 1vh; width: 100%; overflow-y: auto; flex-grow: 1; background: rgba(15,23,42,0.8); padding: 2vh; border-radius: 2vh; border: 1px solid var(--border);}
        .compact-item { background: rgba(30,41,59,0.9); padding: 1vh; border-radius: 1vh; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer; transition: 0.2s;}
        .compact-item:hover { background: rgba(34,211,238,0.2); border-color: var(--cyan-main); transform: scale(1.05); box-shadow: 0 0.5vh 1.5vh rgba(34,211,238,0.3);}
        .compact-en { font-weight: bold; color: #fff; font-size: clamp(12px, 1.6vh, 18px); margin-bottom: 0.3vh;}
        .compact-he { color: var(--emerald-light); font-size: clamp(10px, 1.4vh, 16px);}
        .matrix-card { background: rgba(30, 41, 59, 0.8); border-radius: 1.5vh; border: 1px solid rgba(255,255,255,0.15); padding: 1.5vh; box-shadow: 0 1vh 2vh rgba(0,0,0,0.3);}
        .matrix-header { color: var(--emerald-light); font-weight: 900; border-bottom: 0.2vh solid rgba(255,255,255,0.2); padding-bottom: 0.8vh; margin-bottom: 1.2vh; text-align: center; display: flex; flex-direction: column; font-size: clamp(14px, 2vh, 22px);}
        .matrix-header span:last-child { font-size: clamp(10px, 1.4vh, 16px); color: var(--cyan-light); font-family: monospace; margin-top: 0.4vh; }
        .matrix-list { list-style: none; padding: 0; margin: 0; }
        .matrix-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6vh; font-size: clamp(12px, 1.6vh, 20px); border-bottom: 1px dashed rgba(255, 255, 255, 0.1); padding-bottom: 0.6vh; cursor: pointer; transition: 0.2s;}
        .matrix-item:last-child { border-bottom: none; }
        .matrix-item:hover { background: rgba(34, 211, 238, 0.15); padding: 0.6vh; border-radius: 0.8vh;}
        .matrix-item-en { font-weight: bold; color: #fff; direction: ltr;}
        .matrix-item-he { color: var(--text-muted); font-size: clamp(11px, 1.5vh, 18px); margin-right: 1vw; font-weight: 600;}

        /* CSS ART ENGINE */
        .art-inner-container { width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border-radius: 2vh; border: 1px solid rgba(255,255,255,0.08); box-shadow: inset 0 0 3vh rgba(0,0,0,0.8), 0 1vh 2vh rgba(0,0,0,0.4);}
        .art-emoji-hero { font-size: clamp(60px, 12vh, 150px); z-index: 10; filter: drop-shadow(0 1vh 2vh rgba(0,0,0,0.6)); position: absolute; left: 0; right: 0; margin: 0 auto; text-align: center; display: flex; justify-content: center; align-items: center; }
        .split-left { position: absolute; left: 0; width: 50%; height: 100%; background: #06b6d4; animation: pullLeft 2s infinite alternate;} 
        .split-right { position: absolute; right: 0; width: 50%; height: 100%; background: #10b981; animation: pullRight 2s infinite alternate;} 
        @keyframes pullLeft { 0%{transform: translateX(0);} 100%{transform: translateX(-4vh);} } 
        @keyframes pullRight { 0%{transform: translateX(0);} 100%{transform: translateX(4vh);} }
        .fade-bg { width: 100%; height: 100%; background: radial-gradient(circle, #475569, #020617); }
        @keyframes fadeAnim { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.5); } }
        .shield-pulse { position: absolute; width: 22vh; height: 22vh; border-radius: 50%; border: 0.5vh solid #34d399; box-shadow: 0 0 4vh #10b981; animation: shieldAnim 2s infinite; } 
        @keyframes shieldAnim { 0% { transform: scale(0.8); opacity: 1;} 100% { transform: scale(1.5); opacity: 0;} }
        .flex-band { position: absolute; width: 60%; height: 2vh; background: #fbbf24; border-radius: 1vh; animation: bendAnim 1.5s infinite alternate ease-in-out; } 
        @keyframes bendAnim { 0% { transform: scaleX(1) scaleY(1); } 100% { transform: scaleX(0.5) scaleY(6); } }
        .lang-symbol { position: absolute; font-size: 4vh; color: #fff; opacity: 0.3; animation: floatSub 3s infinite alternate; font-weight: bold; }
        .gift-box { position:absolute; bottom: 10%; left: 0; right: 0; margin: auto; width: 15vh; height: 10vh; background: #be123c; border-radius: 1vh; } 
        .gift-lid { position:absolute; bottom:calc(10% + 10vh); left: 0; right: 0; margin: auto; width: 16vh; height: 3vh; background: #e11d48; border-radius: 0.5vh; animation: openLid 3s infinite alternate ease-in-out; } 
        .poison-bubble { position: absolute; bottom: -10%; left: 0; right: 0; margin: auto; width: 3vh; height: 3vh; background: rgba(34, 197, 94, 0.6); border-radius: 50%; box-shadow: 0 0 2vh #22c55e; animation: bubbleUpPoison 4s infinite linear; } 
        .gold-dust { position: absolute; background: #fde047; border-radius: 50%; width: 0.4vh; height: 0.4vh; box-shadow: 0 0 1vh #fde047; animation: twinkle 2s infinite alternate;} 
        .spotlight-gold { position: absolute; top: -10%; left: 0; right: 0; margin: auto; width: 50%; height: 120%; background: linear-gradient(to bottom, rgba(253, 224, 71, 0.15), transparent); transform: perspective(30vh) rotateX(15deg); filter: blur(2vh); }
        .kiln-fire { position: absolute; bottom: 0; left: 0; right: 0; margin: auto; width: 60%; height: 30%; background: linear-gradient(to top, #ea580c, #fef08a, transparent); filter: blur(2vh); animation: flicker 0.5s infinite alternate; border-radius: 50% 50% 0 0;} 
        .kiln-brick { position: absolute; bottom: 30%; left: 0; right: 0; margin: auto; width: 70%; height: 10%; background: #7f1d1d; border-radius: 1vh; border-bottom: 1vh solid #450a0a;}
        .measure-grid { position: absolute; width: 100%; height: 100%; left: 0; background-image: linear-gradient(rgba(34, 211, 238, 0.2) 0.2vh, transparent 0.2vh), linear-gradient(90deg, rgba(34, 211, 238, 0.2) 0.2vh, transparent 0.2vh); background-size: 4vh 4vh; } 
        .measure-line { position:absolute; width: 100%; left: 0; height: 0.4vh; background: #22d3ee; top: 50%; box-shadow: 0 0 1vh #22d3ee; } 
        .measure-cross { position:absolute; width: 0.4vh; height: 100%; background: #22d3ee; left: 0; right: 0; margin: 0 auto; box-shadow: 0 0 1vh #22d3ee; }
        .fetch-stick { position: absolute; width: 8vh; height: 1.5vh; background: #78350f; border-radius: 1vh; z-index: 5; animation: throwStick 2s infinite ease-in-out alternate; left: 0; right: 0; margin: auto;}
        .scratch-mark { position: absolute; width: 12vh; height: 0.8vh; background: #ef4444; border-radius: 50%; opacity: 0; animation: scratchAnim 2s infinite; transform: rotate(-45deg); box-shadow: 0 0 1vh #ef4444; left: 0; right: 0; margin: auto;}
        .scratch-mark:nth-child(2) { margin-top: 3vh; margin-left: -3vh; animation-delay: 0.2s; }
        .scratch-mark:nth-child(3) { margin-top: 6vh; margin-left: -6vh; animation-delay: 0.4s; }
        .coin { position: absolute; width: 3.5vh; height: 3.5vh; background: #fde047; border-radius: 50%; border: 0.4vh solid #eab308; box-shadow: 0 0 1.5vh #facc15; animation: rainCoins 2.5s infinite linear; left: 0; right: 0; margin: auto;}
        .chain { position: absolute; width: 2.5vh; height: 10vh; border: 0.6vh solid #94a3b8; border-radius: 1.5vh; left: 0; right: 0; margin: auto;}
        .chain-break-left { animation: breakLeft 2s infinite ease-in; margin-left: -5vh;}
        .chain-break-right { animation: breakRight 2s infinite ease-in; margin-left: 5vh;}
        .gear { position: absolute; width: 18vh; height: 18vh; border: 1.5vh dashed #94a3b8; border-radius: 50%; animation: spin 6s infinite linear; opacity: 0.5; left: 0; right: 0; margin: auto;}
        .gear-small { width: 10vh; height: 10vh; border: 1vh dashed #cbd5e1; animation: spin 3s infinite linear reverse; margin-top: 5vh; margin-left: 8vh;}
        .key-glow { position: absolute; width: 25vh; height: 25vh; background: radial-gradient(circle, rgba(253, 224, 71, 0.4) 0%, transparent 70%); animation: pulseSize 2s infinite alternate; left: 0; right: 0; margin: auto;}
        .house-silhouette { position: absolute; bottom: 0; left: 0; right: 0; margin: auto; width: 80%; height: 40%; background: #0f172a; clip-path: polygon(50% 0%, 100% 40%, 100% 100%, 0 100%, 0 40%); border-bottom: 1vh solid #1e293b;}
        .glass-crack { position: absolute; width: 0.4vh; height: 25vh; background: rgba(255,255,255,0.8); transform-origin: center; animation: crackReveal 0.5s forwards ease-out; box-shadow: 0 0 1vh #fff; left: 0; right: 0; margin: auto;}
        .glass-crack:nth-child(1) { transform: rotate(25deg); }
        .glass-crack:nth-child(2) { transform: rotate(75deg); }
        .glass-crack:nth-child(3) { transform: rotate(145deg); }

        .art-ocean { background: linear-gradient(180deg, #0ea5e9 0%, #0369a1 20%, #1e3a8a 50%, #020617 100%); }
        .art-ocean .wave-line { position: absolute; top: 25%; left: 0; width: 100%; height: 0.3vh; background: rgba(255,255,255,0.4); box-shadow: 0 0 2vh #fff;}
        .art-ocean .ruler { position: absolute; left: 10%; top: 25%; bottom: 5%; width: 0.3vh; background: rgba(255,255,255,0.2); }

window.playAudio = function(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = window.speechRate;
        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(v => v.name.includes('Google US English')) || voices.find(v => v.lang === 'en-US' && v.localService === true) || voices.find(v => v.lang.startsWith('en'));
        if (preferredVoice) utterance.voice = preferredVoice;
        window.speechSynthesis.speak(utterance);
    } else { alert("הדפדפן שלך לא תומך בהקראה קולית."); }
};

window.nextWord = function() {
    const currentWords = window.vocabularyData[window.currentDay];
    if (window.wordIndex < currentWords.length - 1) { window.wordIndex++; } 
    else {
        const currentIndex = window.daysList.findIndex(d => d.id === window.currentDay);
        if (currentIndex >= 0 && currentIndex < window.daysList.length - 1) {
            window.currentDay = window.daysList[currentIndex + 1].id;
            window.currentWeek = window.daysList[currentIndex + 1].week;
            window.wordIndex = 0;
        }
    }
    window.render();
};

window.prevWord = function() {
    if (window.wordIndex > 0) { window.wordIndex--; } 
    else {
        const currentIndex = window.daysList.findIndex(d => d.id === window.currentDay);
        if (currentIndex > 0) {
            window.currentDay = window.daysList[currentIndex - 1].id;
            window.currentWeek = window.daysList[currentIndex - 1].week;
            window.wordIndex = window.vocabularyData[window.currentDay].length - 1;
        }
    }
    window.render();
};

/* QUIZ LOGIC */
window.startQuiz = function() {
    let allWords = [];
    Object.values(window.vocabularyData).forEach(day => allWords.push(...day));
    let shuffled = [...allWords].sort(() => 0.5 - Math.random());
    let selectedWords = shuffled.slice(0, 10);
    window.quizQuestions = selectedWords.map(target => {
        let options = [target.meaning];
        let distractors = [...allWords].filter(w => w.word !== target.word).sort(() => 0.5 - Math.random()).slice(0, 3);
        options.push(distractors[0].meaning, distractors[1].meaning, distractors[2].meaning);
        options.sort(() => 0.5 - Math.random());
        let correctIndex = options.indexOf(target.meaning);
        return { word: target.word, engEx: target.engEx, options: options, correctIndex: correctIndex, answered: false, selectedOption: null };
    });
    window.quizState = 'playing';
    window.currentQuizIndex = 0;
    window.quizScore = 0;
    window.render();
};

window.handleAnswer = function(index) {
    let q = window.quizQuestions[window.currentQuizIndex];
    if (q.answered) return;
    q.answered = true;
    q.selectedOption = index;
    if (index === q.correctIndex) { window.quizScore += 10; }
    window.render();
};

window.nextQuizQuestion = function() {
    if (window.currentQuizIndex < 9) { window.currentQuizIndex++; } 
    else {
        window.quizState = 'end';
        const now = new Date();
        const dateStr = now.toLocaleDateString('he-IL') + ' ' + now.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
        window.quizHistory.unshift({ score: window.quizScore, date: dateStr });
        if (window.quizHistory.length > 10) window.quizHistory.pop();
        if (window.quizScore > window.highScore) window.highScore = window.quizScore;
        try { 
            localStorage.setItem('fluencySprintHighScore', window.highScore); 
            localStorage.setItem('fluencySprintHistory', JSON.stringify(window.quizHistory));
        } catch(e) {}
    }
    window.render();
};

window.showQuizHistory = function() { window.quizState = 'history'; window.render(); }

window.clearQuizHistory = function() {
    if(confirm("האם אתה בטוח שברצונך למחוק את היסטוריית המבחנים?")) {
        window.quizHistory = [];
        window.highScore = 0;
        try { localStorage.removeItem('fluencySprintHighScore'); localStorage.removeItem('fluencySprintHistory'); } catch(e) {}
        window.quizState = 'start';
        window.render();
    }
}

    else if (artClass === 'art-pie-chart') inner = `<div class="pie-bg"></div><div class="art-emoji-hero" style="z-index: 20;">${visual}</div>`;
    else if (artClass === 'art-chart-down') inner = `<div class="chart-axis-down"></div><div class="trend-line-down"></div><div class="art-emoji-hero anim-drop">${visual}</div>`;
    else if (artClass === 'art-chart-up' || artClass === 'art-finance-up') inner = `<div class="chart-axis-down" style="border-color:#10b981;"></div><div class="trend-line-down" style="border-color:#6ee7b7; box-shadow: inset -1.5vh 1.5vh 3vh rgba(16,185,129,0.3); transform: skewY(-30deg); bottom:20%; top:auto;"></div><div class="art-emoji-hero anim-rise">${visual}</div>`;
    else if (artClass === 'art-doorway') inner = `<div class="door-frame"></div><div class="art-emoji-hero float-anim" style="filter: drop-shadow(0 0 3vh #fef08a);">${visual}</div>`;
    else if (artClass === 'art-mind') inner = `<div class="pulse-ring"></div><div class="pulse-ring" style="animation-delay: 1.5s; width: 40vh; height: 40vh;"></div><div class="art-emoji-hero">${visual}</div>`;
    else if (artClass === 'art-museum') inner = `<div class="spotlight"></div><div class="pedestal"></div><div class="art-emoji-hero float-anim" style="bottom: 25%;">${visual}</div>`;
    else if (artClass === 'art-nature') inner = `<div class="sun-beam"></div><div class="art-emoji-hero float-anim">${visual}</div>`;
    else if (artClass === 'art-law' || artClass === 'art-danger') inner = `<div class="laser-grid"></div><div class="vignette"></div><div class="art-emoji-hero" style="z-index: 10;">${visual}</div>`;
    else if (artClass === 'art-time') inner = `<div class="clock-face"><div class="hand"></div></div><div class="art-emoji-hero" style="z-index: 20;">${visual}</div>`;
    else if (artClass === 'art-sound') inner = `<div class="sound-bars"><div class="bar" style="animation-delay: 0.1s"></div><div class="bar" style="animation-delay: 0.3s; height: 60%;"></div><div class="bar" style="animation-delay: 0.5s; height: 100%;"></div><div class="bar" style="animation-delay: 0.2s; height: 50%;"></div></div><div class="art-emoji-hero">${visual}</div>`;
    else if (artClass === 'art-electricity' || artClass === 'art-tech' || artClass === 'art-weather') inner = `<div class="circuit-grid"></div><div class="art-emoji-hero pulse-anim">${visual}</div>`;
    else if (artClass === 'art-space') inner = `<div class="planet"></div><div class="star" style="top:20%; left:20%;"></div><div class="star" style="top:40%; right:30%;"></div><div class="art-emoji-hero float-anim">${visual}</div>`;
    else if (artClass === 'art-medical') inner = `<div class="med-cross-v"></div><div class="med-cross-h"></div><div class="art-emoji-hero float-anim">${visual}</div>`;
    else if (artClass === 'art-magic') inner = `<div class="magic-sparkle" style="top:20%;left:30%;">✨</div><div class="magic-sparkle" style="top:60%;right:30%;animation-delay:0.5s;">✨</div><div class="art-emoji-hero pulse-anim">${visual}</div>`;
    else if (artClass === 'art-theater') inner = `<div class="stage-floor"></div><div class="curtain-left"></div><div class="curtain-right"></div><div class="spotlight"></div><div class="art-emoji-hero float-anim" style="bottom: 20%;">${visual}</div>`;
    else if (artClass === 'art-city') inner = `<div class="building-1"></div><div class="building-2"><div class="window" style="top:10%; left:20%"></div><div class="window" style="top:30%; left:60%"></div></div><div class="building-3"></div><div class="art-emoji-hero float-anim" style="bottom: 30%;">${visual}</div>`;
    else if (word === 'Poisonous') inner = `<div class="poison-bubble" style="left:30%"></div><div class="poison-bubble" style="left:60%; animation-delay:1.5s; width:4vh; height:4vh;"></div><div class="poison-bubble" style="left:45%; animation-delay:0.7s; width:2vh; height:2vh;"></div><div class="art-emoji-hero" style="animation: floatSub 4s infinite alternate; filter: drop-shadow(0 0 3vh #22c55e);">${visual}</div>`;
    else if (word === 'Antique') inner = `<div class="spotlight-gold"></div><div class="gold-dust" style="top:30%;left:40%;animation-delay:0.2s;"></div><div class="gold-dust" style="top:50%;left:60%;animation-delay:0.7s;"></div><div class="gold-dust" style="top:60%;left:35%;animation-delay:1.1s;"></div><div class="art-emoji-hero float-anim">${visual}</div>`;
    else if (word === 'Kiln') inner = `<div class="kiln-fire"></div><div class="kiln-brick"></div><div class="art-emoji-hero" style="bottom:45%; animation: floatSub 4s infinite alternate;">${visual}</div>`;
    else if (word === 'Literally') inner = `<div class="measure-grid"></div><div class="measure-line"></div><div class="measure-cross"></div><div class="art-emoji-hero pulse-anim">${visual}</div>`;
    else if (word === 'Fetch') inner = `<div class="fetch-stick"></div><div class="art-emoji-hero float-anim">${visual}</div>`;
    else if (word === 'Scratch Itches') inner = `<div class="scratch-mark"></div><div class="scratch-mark"></div><div class="scratch-mark"></div><div class="art-emoji-hero pulse-anim">${visual}</div>`;
    else if (word === 'Plenty') inner = `<div class="coin" style="left: 20%; animation-delay: 0s;"></div><div class="coin" style="left: 40%; animation-delay: 0.5s;"></div><div class="coin" style="left: 60%; animation-delay: 0.2s;"></div><div class="coin" style="left: 80%; animation-delay: 0.7s;"></div><div class="art-emoji-hero float-anim">${visual}</div>`;
    else if (word === 'Independent') inner = `<div class="chain chain-break-left" style="top: 30%; left: 40%;"></div><div class="chain chain-break-right" style="top: 30%; left: 55%;"></div><div class="art-emoji-hero float-anim" style="z-index: 10;">${visual}</div>`;
    else if (word === 'Owners') inner = `<div class="house-silhouette"></div><div class="key-glow" style="top: 20%; left: 50%; transform: translateX(-50%);"></div><div class="art-emoji-hero float-anim" style="bottom: 30%;">${visual}</div>`;
    else if (word === 'Accident') inner = `<div class="siren"></div><div style="position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 15;"><div class="glass-crack"></div><div class="glass-crack"></div><div class="glass-crack"></div></div><div class="art-emoji-hero" style="animation: slam 1s forwards;">${visual}</div>`;
    else inner = `<div class="pedestal"></div><div class="art-emoji-hero float-anim" style="bottom:25%;">${visual}</div>`;
    
    let bgStyle = '';
    if (word === 'Receive') bgStyle = 'background: radial-gradient(circle, #4c1d95, #020617);';
    else if (word === 'Poisonous') bgStyle = 'background: linear-gradient(to top, #14532d, #020617);';
    else if (word === 'Antique') bgStyle = 'background: linear-gradient(to bottom, #1e293b 40%, #0f172a 100%);';
    else if (word === 'Kiln') bgStyle = 'background: #450a0a;';
    else if (word === 'Literally') bgStyle = 'background: #0f172a;';
    else if (word === 'Scratch Itches') bgStyle = 'background: #fcd34d;';
    else if (word === 'Plenty') bgStyle = 'background: radial-gradient(circle, #0f766e, #020617);';
    else if (word === 'Independent') bgStyle = 'background: linear-gradient(to bottom, #0284c7, #0ea5e9, #38bdf8);';
    else if (word === 'Owners') bgStyle = 'background: linear-gradient(to bottom, #1e1b4b, #020617);';

    return `<div class="art-inner-container ${artClass}" style="${bgStyle}">${inner}</div>`;
};

window.render = function() {
    const app = document.getElementById('content-area');
    const subNavContainer = document.getElementById('sub-nav-container');

    document.getElementById('btn-week1').className = `nav-btn ${window.currentWeek === 'week1' ? 'active-cyan' : ''}`;
    document.getElementById('btn-week2').className = `nav-btn ${window.currentWeek === 'week2' ? 'active-cyan' : ''}`;
    document.getElementById('btn-week3').className = `nav-btn ${window.currentWeek === 'week3' ? 'active-cyan' : ''}`;
    document.getElementById('btn-week7').className = `nav-btn ${window.currentWeek === 'week7' ? 'active-cyan' : ''}`;
    document.getElementById('btn-summary').className = `nav-btn ${window.currentWeek === 'summary' ? 'active-emerald' : ''}`;
    document.getElementById('btn-quiz').className = `nav-btn ${window.currentWeek === 'quiz' ? 'active-emerald' : ''}`;

    if (window.currentWeek !== 'summary' && window.currentWeek !== 'quiz') {
        subNavContainer.style.display = 'flex';
        const weekDays = window.daysList.filter(d => d.week === window.currentWeek);
        let subNavHtml = '';
        weekDays.forEach(d => {
            const isActive = window.currentDay === d.id ? 'active' : '';
            subNavHtml += `<button class="sub-btn ${isActive}" onclick="window.setDay('${d.id}')"><span class="sub-btn-title">${d.title}</span><span class="sub-btn-date">${d.date}</span></button>`;
        });
        subNavContainer.innerHTML = subNavHtml;
    } else {
        subNavContainer.style.display = 'none';
        subNavContainer.innerHTML = '';
    }

    if (window.currentWeek === 'quiz') {
        let quizHTML = '';
        if (window.quizState === 'start') {
            quizHTML = `
                <div class="center-stage" style="padding: 4vh 2vw; max-width: 600px; margin: auto; text-align: center; margin-top: 5vh;">
                    <div style="font-size: 4rem; margin-bottom: 2vh;">🧠</div>
                    <h2 style="font-size: 2.5rem; color: var(--cyan-light); margin-bottom: 1.5vh;">מבחן פלוּאֶנְסִי חכם</h2>
                    <p style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 3vh;">10 שאלות אקראיות מתוך מאגר 160 המילים. בוא נבדוק מה אתה זוכר באמת!</p>
                    <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid var(--emerald-main); padding: 1.5vh; border-radius: 1vh; margin-bottom: 4vh; display: flex; justify-content: space-around;">
                        <span style="color: var(--emerald-light); font-size: 1.2rem; font-weight: bold;">שיא אישי: ${window.highScore} 🏆</span>
                    </div>
                    <div style="display: flex; gap: 1vw; justify-content: center;">
                        <button onclick="window.startQuiz()" class="control-btn" style="flex: 2; justify-content: center;">
                            התחל מבחן עכשיו 🚀
                        </button>
                        <button onclick="window.showQuizHistory()" class="control-btn" style="flex: 1; justify-content: center; background: rgba(30, 41, 59, 0.9); border-color: rgba(255,255,255,0.2);" title="היסטוריית מבחנים">
                            ${window.icons.history}
                        </button>
                    </div>
                </div>
            `;
        } else if (window.quizState === 'history') {
             quizHTML = `
                <div class="center-stage" style="padding: 4vh 2vw; max-width: 600px; margin: auto; text-align: center; margin-top: 5vh; width: 100%;">
                    <h2 style="font-size: 2.5rem; color: var(--cyan-light); margin-bottom: 3vh;">היסטוריית מבחנים 📊</h2>
                    ${window.quizHistory.length === 0 ? '<p style="color: var(--text-muted); font-size: 1.2rem;">אין עדיין מבחנים מוקלטים.</p>' : `
                        <div style="width: 100%; max-height: 40vh; overflow-y: auto; background: rgba(15,23,42,0.5); border-radius: 1vh; border: 1px solid var(--border); margin-bottom: 3vh;">
                            ${window.quizHistory.map((h, i) => `
                                <div class="history-item">
                                    <span style="color: ${h.score >= 80 ? 'var(--emerald-light)' : h.score >= 50 ? 'var(--cyan-light)' : '#fca5a5'}; font-weight:bold;">ציון: ${h.score}</span>
                                    <span style="color: var(--text-muted); font-size: 1rem;">${h.date}</span>
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="window.clearQuizHistory()" class="control-btn" style="width: 100%; justify-content: center; background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #fca5a5; margin-bottom: 1.5vh;">
                            נקה היסטוריה 🗑️
                        </button>
                    `}
                    <button onclick="window.quizState = 'start'; window.render();" class="control-btn" style="width: 100%; justify-content: center;">
                        חזור למבחן 🔙
                    </button>
                </div>
            `;
        } else if (window.quizState === 'playing') {
            let q = window.quizQuestions[window.currentQuizIndex];
            let buttonsHTML = q.options.map((opt, i) => {
                let btnClass = "quiz-opt-btn";
                if (q.answered) {
                    if (i === q.correctIndex) btnClass += " correct";
                    else if (i === q.selectedOption) btnClass += " wrong";
                    else btnClass += " disabled";
                }
                return '<button class="' + btnClass + '" onclick="window.handleAnswer(' + i + ')" ' + (q.answered ? 'disabled' : '') + '>' + opt + '</button>';
            }).join('');

            quizHTML = `
                <div style="max-width: 800px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; height: 100%;">
                    <div class="top-bar" style="margin-bottom: 2vh;">
                        <span style="color: var(--text-muted); font-size: 1.2rem; font-weight: bold;">שאלה ${window.currentQuizIndex + 1} / 10</span>
                        <span style="color: var(--cyan-light); font-size: 1.2rem; font-weight: bold;">ניקוד: ${window.quizScore}</span>
                    </div>
                    <div class="flashcard" style="align-items: center; padding: 4vh 3vw; gap: 3vh; text-align: center;">
                        <button class="audio-btn" onclick="window.playAudio('${q.word.replace(/'/g, "\\'")}')" title="השמע מילה" style="margin: 0 auto;">
                            ${window.icons.volume}
                        </button>
                        <h3 style="font-size: clamp(30px, 5vh, 60px); font-weight: 900; color: #fff; letter-spacing: 1px;" dir="ltr">${q.word}</h3>
                        <p style="color: var(--text-muted); font-size: clamp(14px, 2vh, 22px); font-style: italic; direction: ltr; background: rgba(255,255,255,0.05); padding: 1.5vh; border-radius: 1vh; border-left: 3px solid var(--cyan-main);">
                            "${q.engEx.replace(new RegExp('\\\\b' + q.word.replace(/[-\\/\\\\^$*+?.()|[\\]{}]/g, '\\\\$&') + '(s|es|ed|d|ing|ly)?\\\\b', 'gi'), '_____')}"
                        </p>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5vh; width: 100%; margin-top: 2vh;">
                            ${buttonsHTML}
                        </div>
                        <div style="min-height: 6vh; width: 100%; margin-top: 2vh; display: flex; justify-content: center; align-items: center;">
                            ${q.answered ? `
                                <button onclick="window.nextQuizQuestion()" class="control-btn" style="width: 100%; max-width: 300px; justify-content: center; background: var(--cyan-main); border-color: var(--cyan-light);">
                                    ${window.currentQuizIndex === 9 ? 'לתוצאות המבחן' : 'שאלה הבאה'} ${window.icons.left_arrow}
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        } else if (window.quizState === 'end') {
            let isNewHigh = window.quizScore > window.highScore;
            quizHTML = `
                <div class="center-stage" style="padding: 5vh 2vw; max-width: 600px; margin: auto; text-align: center; margin-top: 5vh;">
                    <div style="font-size: 5rem; margin-bottom: 2vh;">${window.quizScore >= 80 ? '🏆' : window.quizScore >= 50 ? '👍' : '💪'}</div>
                    <h2 style="font-size: 2.5rem; color: #fff; margin-bottom: 1vh;">סיום המבחן!</h2>
                    <p style="font-size: 1.8rem; color: var(--cyan-light); font-weight: bold; margin-bottom: 2vh;">הציון שלך: ${window.quizScore} / 100</p>
                    ${isNewHigh ? `
                        <div style="background: rgba(253, 224, 71, 0.15); border: 1px solid #fde047; padding: 1.5vh; border-radius: 1vh; margin-bottom: 3vh;">
                            <span style="color: #fde047; font-size: 1.4rem; font-weight: bold;">🎉 שיא חדש!</span>
                        </div>
                    ` : `<p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 3vh;">שיא אישי נוכחי: ${window.highScore}</p>`}
                    <button onclick="window.startQuiz()" class="control-btn" style="justify-content: center; width: 100%;">
                        נסה שוב 🔄
                    </button>
                </div>
            `;
        }
        app.innerHTML = quizHTML;

    } else if (window.currentWeek === 'summary') {
        let summaryHtml = `
            <div class="summary-toggles">
                <button onclick="window.setSummaryMode('weeks')" class="sum-toggle ${window.summaryMode === 'weeks' ? 'active' : ''}">תצוגת שבועות</button>
                <button onclick="window.setSummaryMode('compact')" class="sum-toggle ${window.summaryMode === 'compact' ? 'active' : ''}">ריכוז כלל המילים</button>
            </div>
        `;
        if (window.summaryMode === 'weeks') {
            summaryHtml += `<div class="weeks-scroll">`;
            const weekTitles = {'week1': '4 (1)', 'week2': '5 (2)', 'week3': '6 (3)', 'week7': '7 (4)'};
            ['week1', 'week2', 'week3', 'week7'].forEach((week) => {
                summaryHtml += `<div class="week-section"><div class="week-title">שבוע ${weekTitles[week]}</div><div class="days-grid">`;
                Object.entries(window.vocabularyData).filter(([dayKey]) => window.daysList.find(d => d.id === dayKey).week === week).forEach(([dayKey, words]) => {
                    const dayInfo = window.daysList.find(d => d.id === dayKey);
                    summaryHtml += `<div class="matrix-card"><div class="matrix-header"><span>${dayInfo.title}</span><span>${dayInfo.date}</span></div><ul class="matrix-list">`;
                    words.forEach((w, idx) => { summaryHtml += `<li class="matrix-item" onclick="window.goToWord('${dayInfo.id}', ${idx})"><span class="matrix-item-en">${w.word}</span><span class="matrix-item-he">${w.meaning}</span></li>`; });
                    summaryHtml += `</ul></div>`;
                });
                summaryHtml += `</div></div>`;
            });
            summaryHtml += `</div>`;
        } else {
            summaryHtml += `<div class="compact-grid">`;
            Object.entries(window.vocabularyData).forEach(([dayKey, words]) => {
                words.forEach((w, idx) => { summaryHtml += `<div class="compact-item" onclick="window.goToWord('${dayKey}', ${idx})"><span class="compact-en">${w.word}</span><span class="compact-he">${w.meaning}</span></div>`; });
            });
            summaryHtml += `</div>`;
        }
        app.innerHTML = `<div class="matrix-wrapper">${summaryHtml}</div>`;

    } else {
        const currentWords = window.vocabularyData[window.currentDay];
        const wordData = currentWords[window.wordIndex];
        const isFirstWord = window.currentDay === window.daysList[0].id && window.wordIndex === 0;
        const isLastWord = window.currentDay === window.daysList[window.daysList.length - 1].id && window.wordIndex === currentWords.length - 1;

        let dotsHtml = '';
        for(let i=0; i<currentWords.length; i++) {
            let stateClass = i === window.wordIndex ? 'active' : (i < window.wordIndex ? 'done' : 'pending');
            dotsHtml += `<div class="dot ${stateClass}"></div>`;
        }

        app.innerHTML = `
            <div class="top-bar">
                <div class="settings-box">
                    ${window.icons.settings}
                    <select onchange="window.changeRate(this.value)">
                        <option value="0.3" ${window.speechRate === 0.3 ? 'selected' : ''}>סופר איטי (0.3x)</option>
                        <option value="0.4" ${window.speechRate === 0.4 ? 'selected' : ''}>איטי מאוד (0.4x)</option>
                        <option value="0.6" ${window.speechRate === 0.6 ? 'selected' : ''}>איטי (0.6x)</option>
                        <option value="0.85" ${window.speechRate === 0.85 ? 'selected' : ''}>רגיל-איטי (0.85x)</option>
                        <option value="1" ${window.speechRate === 1 ? 'selected' : ''}>רגיל (1.0x)</option>
                    </select>
                </div>
                <div class="progress-box">
                    <span style="margin-bottom: 0.2vh;">מילה ${window.wordIndex + 1} מתוך ${currentWords.length}</span>
                    <div class="progress-dots">${dotsHtml}</div>
                </div>
            </div>

            <div class="flashcard">
                <div class="center-stage">
                    <div class="word-main-row">
                        <button class="audio-btn" onclick="window.playAudio('${wordData.word.replace(/'/g, "\\'")}')" title="השמע מילה">
                            ${window.icons.volume}
                        </button>
                        <div class="word-title">
                            ${wordData.word}
                            <span class="small-emoji">${wordData.visual}</span>
                        </div>
                    </div>
                    <div class="tags-row">
                        <span class="tag-box tag-meaning">${wordData.meaning}</span>
                        <span class="tag-box tag-phonetic" style="white-space: nowrap !important;">[ ${wordData.phonetic} ]</span>
                    </div>
                </div>

                <div class="content-grid">
                    <div class="text-col">
                        <div class="explanation-box">
                            <div class="section-title">
                                ${window.icons.check} הסבר והקשר
                            </div>
                            <div style="margin-top: 0.5vh;">${wordData.exp}</div>
                        </div>

                        <div class="example-box">
                            <div class="section-title emerald" style="margin-bottom: 1.5vh;">
                                ${window.icons.book} דוגמה פרקטית
                            </div>
                            <div class="example-eng-row">
                                <button class="audio-small" onclick="window.playAudio('${wordData.engEx.replace(/'/g, "\\'")}')" title="השמע משפט">
                                    ${window.icons.volume}
                                </button>
                                <div class="example-eng">"${wordData.engEx}"</div>
                            </div>
                            <div class="example-heb">
                                ${wordData.hebEx}
                            </div>
                        </div>
                    </div>

                    <div class="visual-col">
                        ${window.getCustomArtHTML(wordData.word, wordData.visual)}
                    </div>
                </div>
            </div>

            <div class="controls-container">
                <button class="control-btn" onclick="window.nextWord()" ${isLastWord ? 'disabled' : ''}>
                    ${window.icons.left_arrow} הבא
                </button>
                <button class="control-btn" onclick="window.prevWord()" ${isFirstWord ? 'disabled' : ''}>
                    הקודם ${window.icons.right_arrow}
                </button>
            </div>
        `;
    }
};

window.render();
</script>

</body>
</html>
