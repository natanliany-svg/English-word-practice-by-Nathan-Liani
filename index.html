<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Day Fluency Sprint | Master V23 (Ultimate Stability)</title>
    <style>
        /* === Premium UI - Absolute Proportion Engine (V23) === */
        
        /* DESKTOP MAGIC: Shrinks the UI natively to fit beautifully at 100% zoom */
        html { font-size: 11.5px; }

        :root {
            --bg-main: #040914;
            --bg-card: rgba(16, 26, 48, 0.85);
            --border: rgba(34, 211, 238, 0.25);
            --border-light: rgba(52, 211, 153, 0.35);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --cyan-main: #06b6d4;
            --cyan-light: #22d3ee;
            --emerald-main: #10b981;
            --emerald-light: #34d399;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        
        /* Strict 100vh lock to prevent outer body scroll on DESKTOP */
        body { 
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #081024 100%);
            color: var(--text-main); 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 1.5vh 2vw; 
            overflow: hidden; 
        }
        
        .container { 
            width: 100%; 
            max-width: 1400px; 
            display: flex; 
            flex-direction: column; 
            align-items: stretch; 
            height: 100%; 
        }
        
        /* === HEADER === */
        .header-section { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; margin-bottom: 0.5vh; }
        h1 { font-size: clamp(16px, 2.5vh, 26px); font-weight: 900; letter-spacing: 1px; color: #fff; display: flex; align-items: center; gap: 1vh; margin-bottom: 0.5vh; text-shadow: 0 0 10px rgba(34, 211, 238, 0.6);}
        h1 svg { width: 2.5vh; height: 2.5vh; filter: drop-shadow(0 0 10px rgba(34,211,238,0.8)); }
        
        .nav-tier { background: rgba(15, 23, 42, 0.85); border-radius: 0.8vh; border: 1px solid rgba(255,255,255,0.1); padding: 0.4vh 1vw; margin-bottom: 0.5vh; display: flex; gap: 0.5vw; justify-content: center;}
        .nav-btn { background: transparent; border: 1px solid transparent; color: #94a3b8; padding: 0.4vh 1.2vw; border-radius: 0.6vh; font-size: clamp(12px, 1.6vh, 18px); font-weight: bold; cursor: pointer; transition: 0.2s; }
        .nav-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-btn.active-cyan { background: rgba(34, 211, 238, 0.15); color: var(--cyan-light); border-color: rgba(34, 211, 238, 0.5); box-shadow: 0 0 10px rgba(34, 211, 238, 0.2); }
        .nav-btn.active-emerald { background: rgba(52, 211, 153, 0.15); color: var(--emerald-light); border-color: rgba(52, 211, 153, 0.5); }
        
        .sub-nav { display: flex; gap: 0.5vw; justify-content: center; width: 100%; flex-wrap: wrap;}
        .sub-btn { display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.8vh; padding: 0.4vh 1vw; cursor: pointer; color: #94a3b8; transition: 0.2s; min-width: 8vw;}
        .sub-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .sub-btn.active { background: linear-gradient(145deg, #1e293b, #0f172a); color: #fff; border-color: var(--cyan-main); box-shadow: 0 2px 8px rgba(34, 211, 238, 0.3); transform: translateY(-1px);}
        .sub-btn-title { font-size: clamp(10px, 1.3vh, 16px); font-weight: 900; margin-bottom: 0.2vh;}
        .sub-btn-date { font-size: clamp(9px, 1.1vh, 14px); color: var(--cyan-light); font-family: monospace; }

        /* === MAIN CONTENT === */
        #content-area { display: flex; flex-direction: column; flex-grow: 1; min-height: 0; width: 100%; }

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1vh; width: 100%; flex-shrink: 0;}
        .settings-box { display: flex; align-items: center; gap: 1vw; background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(255,255,255,0.1); padding: 0.4vh 1vw; border-radius: 0.8vh;}
        .settings-box select { background: #0f172a; color: var(--cyan-light); border: 1px solid rgba(255,255,255,0.2); padding: 0.3vh 0.6vw; border-radius: 0.5vh; font-size: clamp(10px, 1.4vh, 16px); font-weight: bold; outline: none; cursor: pointer;}
        
        .progress-box { display: flex; flex-direction: column; align-items: flex-end; color: var(--cyan-light); font-size: clamp(11px, 1.4vh, 18px); font-weight: 900; background: rgba(30, 41, 59, 0.9); padding: 0.4vh 1vw; border-radius: 0.8vh; border: 1px solid rgba(255,255,255,0.1);}
        .progress-dots { display: flex; gap: 0.4vw; margin-top: 0.3vh; }
        .dot { height: 0.6vh; border-radius: 0.3vh; transition: 0.3s; }
        .dot.active { width: 3vw; background: var(--cyan-light); box-shadow: 0 0 10px var(--cyan-light); }
        .dot.done { width: 1vw; background: rgba(52, 211, 153, 0.8); }
        .dot.pending { width: 1vw; background: rgba(255,255,255,0.15); }

        /* === FLASHCARD BODY === */
        .flashcard { 
            background: var(--bg-card); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15); 
            border-radius: 2vh; 
            padding: 2vh 3vw; 
            box-shadow: 0 2vh 4vh rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05); 
            display: flex; 
            flex-direction: column;
            gap: 1.5vh; 
            flex-grow: 1; 
            min-height: 0;
            overflow-y: auto; 
            margin-bottom: 1vh;
        }
        
        .flashcard::-webkit-scrollbar, .weeks-scroll::-webkit-scrollbar, .compact-grid::-webkit-scrollbar, .nav-tier::-webkit-scrollbar, .sub-nav::-webkit-scrollbar { width: 8px; height: 8px;}
        .flashcard::-webkit-scrollbar-thumb, .weeks-scroll::-webkit-scrollbar-thumb, .compact-grid::-webkit-scrollbar-thumb, .nav-tier::-webkit-scrollbar-thumb, .sub-nav::-webkit-scrollbar-thumb { background: var(--cyan-main); border-radius: 10px; }
        
        .center-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1vh; background: rgba(255,255,255,0.02); border-radius: 1.5vh; padding: 1.5vh; border-bottom: 1px solid rgba(34, 211, 238, 0.1); flex-shrink: 0; min-height: min-content; }
        .word-main-row { display: flex; align-items: center; justify-content: center; gap: 1.5vw; direction: ltr; }
        .audio-btn { background: rgba(34, 211, 238, 0.1); border: 2px solid var(--cyan-main); color: var(--cyan-light); width: clamp(40px, 5vh, 70px); height: clamp(40px, 5vh, 70px); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); flex-shrink: 0;}
        .audio-btn:hover { background: var(--cyan-main); color: #fff; transform: scale(1.1); box-shadow: 0 0 25px rgba(34, 211, 238, 0.5); }
        .audio-btn svg { width: clamp(20px, 2.5vh, 35px); height: clamp(20px, 2.5vh, 35px); }
        
        .word-title { font-size: clamp(30px, 5.5vh, 70px); font-weight: 900; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); letter-spacing: -1px; display: flex; align-items: center; gap: 1vw; text-align: center;}
        .small-emoji { font-size: clamp(20px, 3.5vh, 45px); filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); margin-top: -0.5vh;}

        .tags-row { display: flex; align-items: stretch; justify-content: center; gap: 1vw; flex-wrap: wrap;}
        .tag-box { font-size: clamp(14px, 2vh, 24px); font-weight: 900; padding: 0.6vh 2vw; border-radius: 1vh; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; min-width: 12vw; text-align: center; }
        .tag-meaning { background: rgba(16, 185, 129, 0.15); color: var(--emerald-light); border: 1px solid rgba(16, 185, 129, 0.4); }
        .tag-phonetic { background: rgba(34, 211, 238, 0.15); color: var(--cyan-light); border: 1px solid rgba(34, 211, 238, 0.4); }

        .content-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 2vw; flex-grow: 1; min-height: min-content; }
        @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } }

        .text-col { display: flex; flex-direction: column; gap: 1.5vh; min-height: min-content; justify-content: center;}
        
        .section-title { font-size: clamp(12px, 1.6vh, 20px); font-weight: bold; color: var(--cyan-light); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 0.5vw; margin-bottom: 0.5vh;}
        .section-title svg { width: clamp(14px, 1.8vh, 22px); height: clamp(14px, 1.8vh, 22px); }
        .section-title.emerald { color: var(--emerald-light); }

        .explanation-box { background: rgba(2, 6, 23, 0.6); border-right: 0.4vw solid var(--cyan-main); padding: 1.5vh 1.5vw; border-radius: 1vh; font-size: clamp(14px, 2vh, 24px); color: #cbd5e1; line-height: 1.4; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); flex-shrink: 0; min-height: min-content;}
        .example-box { background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.95)); border: 1px solid var(--border-light); padding: 2vh 2vw; border-radius: 1.5vh; box-shadow: 0 1vh 2vh rgba(0,0,0,0.4); flex-grow: 1; display: flex; flex-direction: column; justify-content: center; min-height: min-content;}
        
        .example-eng-row { display: flex; align-items: flex-start; gap: 1vw; margin-bottom: 1.5vh; direction: ltr; }
        .audio-small { background: rgba(52, 211, 153, 0.1); color: var(--emerald-light); width: clamp(30px, 4vh, 50px); height: clamp(30px, 4vh, 50px); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--emerald-main); transition: 0.3s; flex-shrink: 0;}
        .audio-small:hover { background: var(--emerald-main); color: #fff; transform: scale(1.1);}
        .audio-small svg { width: clamp(15px, 2vh, 30px); height: clamp(15px, 2vh, 30px); }
        
        .example-eng { font-size: clamp(16px, 2.8vh, 36px); color: #fff; font-style: italic; font-family: Georgia, serif; line-height: 1.3; padding-top: 0.5vh; text-shadow: 0 2px 4px rgba(0,0,0,0.5);}
        .example-heb { font-size: clamp(14px, 2.2vh, 28px); color: var(--emerald-light); font-weight: 600; border-right: 0.4vw solid var(--emerald-main); padding-right: 1vw; margin-right: 4vw; line-height: 1.4;}

        .visual-col { display: flex; align-items: stretch; justify-content: center; min-height: 200px;}

        /* ==================================================================== */
        /* === MASTER CSS ART ENGINE (V23) - STABLE IN <HEAD> WITH ABSOLUTE CENTERING === */
        /* ==================================================================== */
        
        .art-inner-container { 
            width: 100%; height: 100%; position: relative; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 2vh; border: 1px solid rgba(255,255,255,0.08); 
            box-shadow: inset 0 0 3vh rgba(0,0,0,0.8), 0 1vh 2vh rgba(0,0,0,0.4);
        }
        
        .art-emoji-hero { 
            font-size: clamp(60px, 12vh, 150px); z-index: 10; 
            filter: drop-shadow(0 1vh 2vh rgba(0,0,0,0.6)); position: absolute;
            left: 0; right: 0; margin: 0 auto; text-align: center;
        }

        /* --- Special Word Overrides --- */
        .gift-box { position:absolute; bottom: 10%; left: 0; right: 0; margin: auto; width: 15vh; height: 10vh; background: #be123c; border-radius: 1vh; } 
        .gift-lid { position:absolute; bottom:calc(10% + 10vh); left: 0; right: 0; margin: auto; width: 16vh; height: 3vh; background: #e11d48; border-radius: 0.5vh; animation: openLid 3s infinite alternate ease-in-out; } 
        
        .poison-bubble { position: absolute; bottom: -10%; left: 0; right: 0; margin: auto; width: 3vh; height: 3vh; background: rgba(34, 197, 94, 0.6); border-radius: 50%; box-shadow: 0 0 2vh #22c55e; animation: bubbleUpPoison 4s infinite linear; } 
        
        .gold-dust { position: absolute; background: #fde047; border-radius: 50%; width: 0.4vh; height: 0.4vh; box-shadow: 0 0 1vh #fde047; animation: twinkle 2s infinite alternate;} 
        .spotlight-gold { position: absolute; top: -10%; left: 0; right: 0; margin: auto; width: 50%; height: 120%; background: linear-gradient(to bottom, rgba(253, 224, 71, 0.15), transparent); transform: perspective(30vh) rotateX(15deg); filter: blur(2vh); }
        
        .kiln-fire { position: absolute; bottom: 0; left: 0; right: 0; margin: auto; width: 60%; height: 30%; background: linear-gradient(to top, #ea580c, #fef08a, transparent); filter: blur(2vh); animation: flicker 0.5s infinite alternate; border-radius: 50% 50% 0 0;} 
        .kiln-brick { position: absolute; bottom: 30%; left: 0; right: 0; margin: auto; width: 70%; height: 10%; background: #7f1d1d; border-radius: 1vh; border-bottom: 1vh solid #450a0a;}
        
        .measure-grid { position: absolute; width: 100%; height: 100%; left: 0; background-image: linear-gradient(rgba(34, 211, 238, 0.2) 0.2vh, transparent 0.2vh), linear-gradient(90deg, rgba(34, 211, 238, 0.2) 0.2vh, transparent 0.2vh); background-size: 4vh 4vh; } 
        .measure-line { position:absolute; width: 100%; left: 0; height: 0.4vh; background: #22d3ee; top: 50%; box-shadow: 0 0 1vh #22d3ee; } 
        .measure-cross { position:absolute; width: 0.4vh; height: 100%; background: #22d3ee; left: 0; right: 0; margin: 0 auto; box-shadow: 0 0 1vh #22d3ee; }

        .fetch-stick { position: absolute; width: 8vh; height: 1.5vh; background: #78350f; border-radius: 1vh; z-index: 5; animation: throwStick 2s infinite ease-in-out alternate; left: 0; right: 0; margin: auto;}
        
        .scratch-mark { position: absolute; width: 12vh; height: 0.8vh; background: #ef4444; border-radius: 50%; opacity: 0; animation: scratchAnim 2s infinite; transform: rotate(-45deg); box-shadow: 0 0 1vh #ef4444; left: 0; right: 0; margin: auto;}
        .scratch-mark:nth-child(2) { margin-top: 3vh; margin-left: -3vh; animation-delay: 0.2s; }
        .scratch-mark:nth-child(3) { margin-top: 6vh; margin-left: -6vh; animation-delay: 0.4s; }

        .coin { position: absolute; width: 3.5vh; height: 3.5vh; background: #fde047; border-radius: 50%; border: 0.4vh solid #eab308; box-shadow: 0 0 1.5vh #facc15; animation: rainCoins 2.5s infinite linear; left: 0; right: 0; margin: auto;}
        
        .chain { position: absolute; width: 2.5vh; height: 10vh; border: 0.6vh solid #94a3b8; border-radius: 1.5vh; left: 0; right: 0; margin: auto;}
        .chain-break-left { animation: breakLeft 2s infinite ease-in; margin-left: -5vh;}
        .chain-break-right { animation: breakRight 2s infinite ease-in; margin-left: 5vh;}

        .gear { position: absolute; width: 18vh; height: 18vh; border: 1.5vh dashed #94a3b8; border-radius: 50%; animation: spin 6s infinite linear; opacity: 0.5; left: 0; right: 0; margin: auto;}
        .gear-small { width: 10vh; height: 10vh; border: 1vh dashed #cbd5e1; animation: spin 3s infinite linear reverse; margin-top: 5vh; margin-left: 8vh;}

        .key-glow { position: absolute; width: 25vh; height: 25vh; background: radial-gradient(circle, rgba(253, 224, 71, 0.4) 0%, transparent 70%); animation: pulseSize 2s infinite alternate; left: 0; right: 0; margin: auto;}
        .house-silhouette { position: absolute; bottom: 0; left: 0; right: 0; margin: auto; width: 80%; height: 40%; background: #0f172a; clip-path: polygon(50% 0%, 100% 40%, 100% 100%, 0 100%, 0 40%); border-bottom: 1vh solid #1e293b;}

        .glass-crack { position: absolute; width: 0.4vh; height: 25vh; background: rgba(255,255,255,0.8); transform-origin: center; animation: crackReveal 0.5s forwards ease-out; box-shadow: 0 0 1vh #fff; left: 0; right: 0; margin: auto;}
        .glass-crack:nth-child(1) { transform: rotate(25deg); }
        .glass-crack:nth-child(2) { transform: rotate(75deg); }
        .glass-crack:nth-child(3) { transform: rotate(145deg); }

        /* --- Base Category Styles --- */
        .art-ocean { background: linear-gradient(180deg, #0ea5e9 0%, #0369a1 20%, #1e3a8a 50%, #020617 100%); }
        .art-ocean .wave-line { position: absolute; top: 25%; left: 0; width: 100%; height: 0.3vh; background: rgba(255,255,255,0.4); box-shadow: 0 0 2vh #fff;}
        .art-ocean .ruler { position: absolute; left: 10%; top: 25%; bottom: 5%; width: 0.3vh; background: rgba(255,255,255,0.2); }
        .art-ocean .tick { position: absolute; left: 0; width: 3vh; height: 0.3vh; background: rgba(255,255,255,0.5); }
        
        .art-auction { background: radial-gradient(circle at center, #78350f 0%, #2e1001 100%); }
        .art-auction .desk { position: absolute; bottom: 5%; left: 0; right: 0; margin: auto; width: 70%; height: 20%; background: #5c2606; border-top: 0.8vh solid #8b3c06; border-radius: 1vh; transform: perspective(40vh) rotateX(25deg); box-shadow: 0 3vh 3vh rgba(0,0,0,0.8);}
        .art-auction .hammer-anim { transform-origin: bottom right; margin-right: -10vh; animation: slam 1s infinite alternate ease-in;}
        
        .art-build { background-color: #7f1d1d; background-image: linear-gradient(rgba(255,255,255,0.15) 0.3vh, transparent 0.3vh), linear-gradient(90deg, rgba(255,255,255,0.15) 0.3vh, transparent 0.3vh); background-size: 8vh 4vh; background-position: 0 0, 4vh 2vh;}
        .art-build .fire-glow { position: absolute; bottom: -3vh; left: 0; width: 100%; height: 50%; background: linear-gradient(to top, #ea580c, transparent); opacity: 0.6; filter: blur(2vh); animation: flicker 2s infinite alternate;}
        
        .art-market { background: radial-gradient(circle at center, #1e293b, #020617); }
        .art-market .shelf { position: absolute; bottom: 20%; left: 0; right: 0; margin: auto; width: 80%; height: 1.5vh; background: #cbd5e1; border-radius: 1vh; box-shadow: 0 1.5vh 2vh rgba(0,0,0,0.5);}
        .art-market .laser-scanner { position: absolute; top: 0; left: 0; right: 0; margin: auto; width: 0.4vh; height: 100%; background: rgba(34,211,238,0.5); box-shadow: 0 0 2vh var(--cyan-light); animation: scanLeftRight 3s ease-in-out infinite alternate;}
        
        .art-pie-chart { background: radial-gradient(circle at center, #1e293b, #020617); }
        .art-pie-chart .pie-bg { position: absolute; left: 0; right: 0; margin: auto; width: 25vh; height: 25vh; border-radius: 50%; background: conic-gradient(var(--cyan-main) 0deg, var(--cyan-main) 120deg, #334155 120deg, #334155 360deg); box-shadow: 0 1.5vh 4vh rgba(0,0,0,0.6); border: 0.3vh solid rgba(255,255,255,0.1); transform: rotate(-45deg);}
        
        .art-chart-down { background: radial-gradient(circle at bottom right, #7f1d1d, #020617); }
        .art-chart-down .chart-axis-down { position: absolute; top: 15%; left: 0; right: 0; margin: auto; width: 70%; height: 70%; border-bottom: 0.5vh solid #ef4444; border-left: 0.5vh solid #ef4444; }
        .art-chart-down .trend-line-down { position: absolute; top: 20%; left: 0; right: 0; margin: auto; width: 70%; height: 65%; border-top: 0.6vh solid #fca5a5; transform-origin: top left; transform: rotate(35deg); box-shadow: inset -1.5vh 1.5vh 3vh rgba(239,68,68,0.3);}
        
        .art-doorway { background: #020617; }
        .art-doorway .door-frame { position: absolute; left: 0; right: 0; margin: auto; width: 18vh; height: 28vh; border: 0.5vh solid #fef08a; border-bottom: none; box-shadow: 0 0 6vh #fef08a; background: linear-gradient(to top, rgba(253, 224, 71, 0.3), transparent); display: flex; align-items: center; justify-content: center;}
        
        .art-mind { background: radial-gradient(circle at center, #4c1d95, #020617); }
        .art-mind .pulse-ring { position: absolute; left: 0; right: 0; margin: auto; width: 20vh; height: 20vh; border: 0.4vh solid #d946ef; border-radius: 50%; animation: expandPulse 2s infinite; }
        
        .art-museum { background: linear-gradient(to bottom, #1e293b 40%, #0f172a 100%); }
        .art-museum .spotlight { position: absolute; top: -10%; left: 0; right: 0; margin: auto; width: 50%; height: 120%; background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent); transform: perspective(30vh) rotateX(15deg); filter: blur(2vh);}
        .art-museum .pedestal { position: absolute; bottom: 15%; left: 0; right: 0; margin: auto; width: 25vh; height: 6vh; background: #334155; border-radius: 50%; border: 0.4vh solid #cbd5e1; box-shadow: 0 1.5vh 3vh rgba(0,0,0,0.8); }
        
        .art-nature { background: linear-gradient(135deg, #14532d, #020617); }
        .art-nature .sun-beam { position: absolute; top: -50%; left: 0; right: 0; margin: auto; width: 50%; height: 200%; background: linear-gradient(to bottom, rgba(255,255,255,0.1), transparent); transform: rotate(30deg); }
        
        .art-law { background: #020617; }
        .art-law .laser-grid { position: absolute; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 4vh, rgba(239,68,68,0.8) 4vh, rgba(239,68,68,0.8) 4.5vh); animation: scanVert 4s linear infinite; box-shadow: 0 0 3vh rgba(239,68,68,0.5);}
        .art-law .vignette { position: absolute; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent, #020617 80%); z-index: 5;}
        
        .art-time { background: radial-gradient(circle at center, #0f766e, #020617); }
        .art-time .clock-face { position: absolute; left: 0; right: 0; margin: auto; width: 22vh; height: 22vh; border: 0.8vh solid #5eead4; border-radius: 50%; box-shadow: 0 0 3vh #5eead4;}
        .art-time .hand { position: absolute; left: 0; right: 0; margin: auto; width: 0.6vh; height: 9vh; background: #fff; transform-origin: bottom center; top: calc(50% - 9vh); animation: tick 10s linear infinite;}
        
        .art-sound { background: radial-gradient(circle at center, #1e1b4b, #020617); }
        .art-sound .sound-bars { position: absolute; left: 0; right: 0; margin: auto; display: flex; gap: 1.5vh; align-items: center; justify-content: center; height: 15vh; opacity: 0.5;}

window.setWeek = function(week) {
    window.currentWeek = week;
    if (week === 'week1') window.currentDay = 'w1d1';
    else if (week === 'week2') window.currentDay = 'w2d1';
    else if (week === 'week3') window.currentDay = 'w3d1';
    else window.currentDay = 'summary';
    window.wordIndex = 0;
    window.render();
};

window.setDay = function(dayId) {
    window.currentDay = dayId;
    window.wordIndex = 0;
    window.render();
};

window.setSummaryMode = function(mode) {
    window.summaryMode = mode;
    window.render();
};

window.goToWord = function(dayId, index) {
    window.currentDay = dayId;
    window.currentWeek = window.daysList.find(d => d.id === dayId).week;
    window.wordIndex = index;
    window.render();
};

window.changeRate = function(val) {
    window.speechRate = parseFloat(val);
    window.render();
};

window.playAudio = function(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = window.speechRate;
        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(v => v.name.includes('Google US English')) ||
                               voices.find(v => v.lang === 'en-US' && v.localService === true) ||
                               voices.find(v => v.lang.startsWith('en'));
        if (preferredVoice) utterance.voice = preferredVoice;
        window.speechSynthesis.speak(utterance);
    } else {
        alert("הדפדפן שלך לא תומך בהקראה קולית.");
    }
};

window.nextWord = function() {
    const currentWords = window.vocabularyData[window.currentDay];
    if (window.wordIndex < currentWords.length - 1) {
        window.wordIndex++;
    } else {
        const currentIndex = window.daysList.findIndex(d => d.id === window.currentDay);
        if (currentIndex >= 0 && currentIndex < window.daysList.length - 1) {
            window.currentDay = window.daysList[currentIndex + 1].id;
            window.currentWeek = window.daysList[currentIndex + 1].week;
            window.wordIndex = 0;
        }
    }
    window.render();
};

window.prevWord = function() {
    if (window.wordIndex > 0) {
        window.wordIndex--;
    } else {
        const currentIndex = window.daysList.findIndex(d => d.id === window.currentDay);
        if (currentIndex > 0) {
            window.currentDay = window.daysList[currentIndex - 1].id;
            window.currentWeek = window.daysList[currentIndex - 1].week;
            window.wordIndex = window.vocabularyData[window.currentDay].length - 1;
        }
    }
    window.render();
};

window.render = function() {
    const app = document.getElementById('content-area');
    const subNavContainer = document.getElementById('sub-nav-container');

    document.getElementById('btn-week1').className = `nav-btn ${window.currentWeek === 'week1' ? 'active-cyan' : ''}`;
    document.getElementById('btn-week2').className = `nav-btn ${window.currentWeek === 'week2' ? 'active-cyan' : ''}`;
    document.getElementById('btn-week3').className = `nav-btn ${window.currentWeek === 'week3' ? 'active-cyan' : ''}`;
    document.getElementById('btn-summary').className = `nav-btn ${window.currentWeek === 'summary' ? 'active-emerald' : ''}`;

    if (window.currentWeek !== 'summary') {
        subNavContainer.style.display = 'flex';
        const weekDays = window.daysList.filter(d => d.week === window.currentWeek);
        let subNavHtml = '';
        weekDays.forEach(d => {
            const isActive = window.currentDay === d.id ? 'active' : '';
            subNavHtml += `
                <button class="sub-btn ${isActive}" onclick="window.setDay('${d.id}')">
                    <span class="sub-btn-title">${d.title}</span>
                    <span class="sub-btn-date">${d.date}</span>

        });
        subNavContainer.innerHTML = subNavHtml;

    if (window.currentWeek === 'summary') {

                        <option value="0.6" ${window.speechRate === 0.6 ? 'selected' : ''}>איטי (0.6x)</option>
                        <option value="0.85" ${window.speechRate === 0.85 ? 'selected' : ''}>רגיל-איטי (0.85x)</option>
                        <option value="1" ${window.speechRate === 1 ? 'selected' : ''}>רגיל (1.0x)</option>
                    </select>
                </div>

                <div class="progress-box">
                    <span style="margin-bottom: 0.2vh;">מילה ${window.wordIndex + 1} מתוך ${currentWords.length}</span>
                    <div class="progress-dots">${dotsHtml}</div>
                </div>
            </div>

            <div class="flashcard">
                <!-- Top Section -->
                <div class="center-stage">
                    <div class="word-main-row">
                        <button class="audio-btn" onclick="window.playAudio('${wordData.word.replace(/'/g, "\\'")}')" title="השמע מילה">
                            ${window.icons.volume}
                        </button>
                        <div class="word-title">
                            ${wordData.word}
                            <span class="small-emoji">${wordData.visual}</span>
                        </div>
                    </div>
                    <div class="tags-row">
                        <span class="tag-box tag-meaning">${wordData.meaning}</span>
                        <span class="tag-box tag-phonetic">[ ${wordData.phonetic} ]</span>
                    </div>
                </div>

                <!-- Lower Split Grid -->
                <div class="content-grid">
                    <!-- Right Column (Text) -->
                    <div class="text-col">
                        <div class="explanation-box">
                            <div class="section-title">
                                ${window.icons.check} הסבר והקשר
                            </div>
                            <div style="margin-top: 0.5vh;">${wordData.exp}</div>
                        </div>

                        <div class="example-box">
                            <div class="section-title emerald" style="margin-bottom: 1.5vh;">
                                ${window.icons.book} דוגמה פרקטית
                            </div>
                            <div class="example-eng-row">
                                <button class="audio-small" onclick="window.playAudio('${wordData.engEx.replace(/'/g, "\\'")}')" title="השמע משפט">
                                    ${window.icons.volume}
                                </button>
                                <div class="example-eng">"${wordData.engEx}"</div>
                            </div>
                            <div class="example-heb">
                                ${wordData.hebEx}
                            </div>
                        </div>
                    </div>

                    <!-- Left Column (Visual Canvas) -->
                    <div class="visual-col">
                        ${window.getCustomArtHTML(wordData.word, wordData.visual)}
                    </div>
                </div>
            </div>

            <!-- Controls FIXED at the bottom -->
            <div class="controls-container">
                <button class="control-btn" onclick="window.nextWord()" ${isLastWord ? 'disabled' : ''}>
                    ${window.icons.left_arrow} הבא
                </button>

                <button class="control-btn" onclick="window.prevWord()" ${isFirstWord ? 'disabled' : ''}>
                    הקודם ${window.icons.right_arrow}
                </button>
            </div>
        `;
    }
};

window.render();
</script>

</body>
</html>
