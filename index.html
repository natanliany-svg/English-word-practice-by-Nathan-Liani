<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Day Fluency Sprint | Master V50 (Stable & Clean)</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="header-section w-full">
        <h1>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            Day Fluency Sprint | Master V50
        </h1>
        
        <div class="nav-tier">
            <button class="nav-btn" id="btn-home" onclick="window.setWeek('home')">ראשי 🏠</button>
            <button class="nav-btn" id="btn-week1" onclick="window.setWeek('week1')"><small style="opacity:0.7; margin-left:4px;">1.</small> שבוע 4 📚</button>
            <button class="nav-btn" id="btn-week2" onclick="window.setWeek('week2')"><small style="opacity:0.7; margin-left:4px;">2.</small> שבוע 5 🚀</button>
            <button class="nav-btn" id="btn-week3" onclick="window.setWeek('week3')"><small style="opacity:0.7; margin-left:4px;">3.</small> שבוע 6 🎓</button>
            <button class="nav-btn" id="btn-week7" onclick="window.setWeek('week7')"><small style="opacity:0.7; margin-left:4px;">4.</small> שבוע 7 💎</button>
            <button class="nav-btn" id="btn-article" onclick="window.setWeek('article')"><small style="opacity:0.7; margin-left:4px;">5.</small> שבוע 8 📄</button>
            <button class="nav-btn" id="btn-week9" onclick="window.setWeek('week9')"><small style="opacity:0.7; margin-left:4px;">6.</small> שבוע 9 🔐</button>
            <button class="nav-btn" id="btn-quiz" onclick="window.setWeek('quiz')">מבחן חכם 🧠</button>
            <button class="nav-btn" id="btn-summary" onclick="window.setWeek('summary')">סיכום לפי מילים 🗂️</button>
        </div>

        <div class="sub-nav" id="sub-nav-container"></div>
    </div>

    <main id="content-area"></main>
    
    <!-- Audio Player Bar -->
    <div id="audio-player" class="audio-player-bar">
        <div class="audio-controls-row">
            <button class="player-btn stop" onclick="window.stopAudio()" title="עצור">
                <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="6" width="12" height="12"/></svg>
            </button>
            <button class="player-btn" onclick="window.seekRelative(-5)" title="5 שניות אחורה">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>
            </button>
            <button id="play-pause-btn" class="player-btn play-pause" onclick="window.togglePlayPause()" title="נגן / השהה">
                <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </button>
            <button class="player-btn" onclick="window.seekRelative(5)" title="5 שניות קדימה">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg>
            </button>
        </div>
        <div class="audio-progress-container" dir="ltr">
            <span id="audio-time-current" class="audio-time">00:00</span>
            <input type="range" id="audio-slider" class="audio-slider" min="0" max="100" value="0" onmousedown="window.startAudioDrag()" ontouchstart="window.startAudioDrag()" oninput="window.handleSliderInput(this.value)" onmouseup="window.stopAudioDrag(this.value)" ontouchend="window.stopAudioDrag(this.value)">
            <span id="audio-time-total" class="audio-time">00:00</span>
        </div>
    </div>
</div>

<script src="js/data.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
